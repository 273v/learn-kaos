<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="KAOS">
  <!-- Kelvin-sign monogram, matching kelvin.legal's brand mark: the
       Kelvin sign (K) in white serif on a rounded-square teal field
       (brand primary #005073 -> accent #189ad3). -->
  <defs>
    <linearGradient id="kaos-mark-gradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#005073"/>
      <stop offset="100%" stop-color="#189ad3"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7" fill="url(#kaos-mark-gradient)" stroke="#005073" stroke-width="0.5"/>
  <rect x="1" y="1" width="30" height="14" rx="6.5" fill="#ffffff" opacity="0.06"/>
  <text x="16" y="22.5" text-anchor="middle" fill="#ffffff"
        font-family="'Source Serif 4 Variable', Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="600" letter-spacing="-0.04em"
        style="text-rendering: geometricPrecision;">K</text>
</svg>
